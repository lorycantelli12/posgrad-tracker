name: Scraper Diário

on:
  schedule:
    # 07:00 BRT = 10:00 UTC (UTC-3)
    - cron: "0 10 * * *"
  workflow_dispatch: # Permite rodar manualmente pelo GitHub Actions UI

jobs:
  pipeline:
    name: Coleta → Matching → Notificações
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Instalar browsers Playwright
        run: python -m playwright install chromium --with-deps

      - name: Criar .env.local com secrets
        run: |
          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY=${{ secrets.ONESIGNAL_REST_API_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          EOF

      - name: 1/3 — Rodar scrapers
        run: python scrapers/main.py all

      - name: 2/3 — Rodar matching engine
        run: python matching/run.py

      - name: 3/3 — Enviar notificações push
        run: python notify/send_push.py

      - name: Upload logs como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
